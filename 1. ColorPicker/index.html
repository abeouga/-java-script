<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイトル</title>

    <link rel="stylesheet" href="style.css">
    <script src="first.js" defer></script>
    <!--scriptタグに deferがあることで、非同期処理で処理を進めることができる。(HTMLの読み込みより先に jsが読み込まれる。jsの読み込みを前提にHTMLを組んでいる場合、読み込みが遅くなるから deferをつける。)-->
</head>

<body>
    <div>
        <p id="colorText">カラーコードを検索</p>
        <input id="colorPicker" type="color"> <!--input属性を colorにすることで、HTML標準機能のカラーピッカーを表示する。-->
    </div>
</body>

</html>
